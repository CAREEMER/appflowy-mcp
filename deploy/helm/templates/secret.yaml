{{- if not .Values.appflowy.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "appflowy-mcp.secretName" . }}
  labels:
    {{- include "appflowy-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.appflowy.password }}
  password: {{ .Values.appflowy.password | quote }}
  {{- end }}
  {{- if .Values.appflowy.accessToken }}
  access-token: {{ .Values.appflowy.accessToken | quote }}
  {{- end }}
  tokens: {{ toJson .Values.tokens | quote }}
{{- end }}
