name: release

# Manually triggered from the Actions tab (Run workflow).
# Pick the semver bump; the workflow computes the next version from the
# latest v* tag, tags main, creates a GitHub Release, and builds the image.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # need full history + tags to compute the next version

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          [ -z "$latest" ] && latest="v0.0.0"
          echo "Latest tag: $latest"

          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          version="${major}.${minor}.${patch}"
          tag="v${version}"
          echo "Next version: $tag"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists" && exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target main \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

  image:
    needs: tag
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/docker.yml
    with:
      ref: ${{ needs.tag.outputs.tag }}
      version: ${{ needs.tag.outputs.version }}
